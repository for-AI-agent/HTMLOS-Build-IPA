name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project HTMLOS.xcodeproj \
            -scheme HTMLOS \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/HTMLOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_PREVIEWS=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/HTMLOS.xcarchive/Products/Applications/HTMLOS.app Payload/
          zip -r HTMLOS.ipa Payload

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTMLOS-IPA
          path: HTMLOS.ipa
